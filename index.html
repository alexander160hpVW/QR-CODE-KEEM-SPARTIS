<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εβδομαδιαίο Μενού</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.menu-image{
width:100%;
max-width:900px;
height:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<h1>Μενού Εβδομάδας</h1>

<img id="menuImage" class="menu-image" src="menu1.png" alt="Menu εβδομάδας">

</div>

<script>

async function getInternetDate(){

try{

const response = await fetch("https://worldtimeapi.org/api/timezone/Europe/Athens");
const data = await response.json();
return new Date(data.datetime);

}catch{

return new Date();

}

}

function getWeekSinceStartOfYear(date){

const start = new Date(date.getFullYear(),0,1);

const diff = date - start;

const oneWeek = 1000 * 60 * 60 * 24 * 7;

return Math.floor(diff / oneWeek);

}

async function loadMenu(){

const today = await getInternetDate();

const week = getWeekSinceStartOfYear(today);

const menuNumber = (week % 5) + 1;

document.getElementById("menuImage").src = "menu" + menuNumber + ".png";

}

loadMenu();

</script>

</body>
</html>
